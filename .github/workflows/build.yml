name: Build ZMK firmware

on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip
          pip3 install west

      - name: Init workspace
        run: west init -l config

      - name: Update modules
        run: west update

      - name: Build firmware
        run: west build -s zmk/app -b nice_nano_v2 -- -DSHIELD=lily58_left

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: build/zephyr/zmk.uf2
